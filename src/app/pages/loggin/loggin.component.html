<h1 class="text-3xl">Loggin</h1>
<hr class="my-2" />

<section>
  <p class="mb-4">Pagina de incio de sesion</p>
  <form class=" flex flex-col  gap-2"
  [formGroup]="loggingForm"
  (ngSubmit)="onSubmit()"
  >

  <input
  type="text" class="w-full text-gray-800 placeholder-gray-400 bg-white border border-gray-300 rounded-lg px-4 py-2.5 pr-12 outline-none " placeholder="Correo Electronico"
  formControlName="email"
  />

  <div class="relative w-full">
  <input
    [type]="mostrarPassword() ? 'text' : 'password'"
    class="w-full text-gray-800 placeholder-gray-400 bg-white border border-gray-300 rounded-lg px-4 py-2.5 pr-12 outline-none focus:border-blue-700 focus:ring-1 focus:ring-blue-700 transition-all"
    placeholder="Contraseña"
    formControlName="password"
  />

  <button
    type="button"
    (click)="togglePassword()"
    class="absolute inset-y-0 right-0 flex items-center px-4 text-gray-500 hover:text-blue-700 focus:outline-none focus:text-blue-800"
    title="Mostrar/Ocultar contraseña"
  >
    <svg *ngIf="!mostrarPassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
    </svg>

    <svg *ngIf="mostrarPassword()" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
    </svg>
  </button>
</div>

  <button type="submit"  class="btn bg-teal-300">Iniciar sesion</button>
  @if(hasError()){
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
  <strong class="font-bold">¡Error!</strong>
  <span>Por favor revise la informacion ingresada .</span>
</div>
  }

  </form>
</section>
