<div class="min-h-screen bg-gray-100 p-6">
  <div class="max-w-3xl mx-auto bg-white shadow-lg rounded-xl overflow-hidden">

    <!-- Encabezado -->
    <div class="bg-blue-700 p-4 text-white flex justify-between items-center">
      <h2 class="text-xl font-bold uppercase tracking-wider">Registro de Usuario</h2>
      <div class="text-right">
        <span class="text-xs block opacity-80 text-blue-200">Folio Sistema</span>
        <span class="font-mono text-lg font-bold"># {{ folioActual }}</span>
      </div>
    </div>

    <!-- Formulario -->
    <form [formGroup]="usuarioForm" (ngSubmit)="guardarUsuario()" class="p-6 space-y-8">

      <!-- Datos del Usuario -->
      <section>
        <div class="flex items-center border-b border-gray-200 pb-2 mb-4">
          <span class="bg-blue-100 text-blue-700 p-2 rounded-full mr-3 text-sm font-bold">01</span>
          <h3 class="text-lg font-semibold text-gray-700 uppercase">Datos del Usuario</h3>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex flex-col">
            <label class="text-xs font-semibold text-gray-500 mb-1 uppercase">Nombre Completo</label>
            <input type="text" formControlName="nombre" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-gray-900 placeholder-gray-400" placeholder="Ejemplo: Juan Pérez">
          </div>
          <div class="flex flex-col">
            <label class="text-xs font-semibold text-gray-500 mb-1 uppercase">Correo Electrónico</label>
            <input type="email" formControlName="correo" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-gray-900 placeholder-gray-400" placeholder="ejemplo@correo.com">
          </div>
          <div class="flex flex-col">
            <label class="text-xs font-semibold text-gray-500 mb-1 uppercase">Teléfono</label>
            <input type="tel" formControlName="telefono" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-gray-900 placeholder-gray-400" placeholder="5551234567">
          </div>
          <div class="flex flex-col">
            <label class="text-xs font-semibold text-gray-500 mb-1 uppercase">Contraseña</label>
            <input type="password" formControlName="password" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-gray-900 placeholder-gray-400" placeholder="Mínimo 6 caracteres">
          </div>
          <div class="flex flex-col">
            <label class="text-xs font-semibold text-gray-500 mb-1 uppercase">Rol</label>
            <select formControlName="rol" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-gray-900">
              <option value="">Seleccione un rol</option>
              <option value="admin">Administrador</option>
              <option value="operador">Operador</option>
              <option value="cliente">Cliente</option>
            </select>
          </div>
        </div>
      </section>

      <!-- Botón -->
      <div class="pt-4">
        <button type="submit" [disabled]="usuarioForm.invalid || isPosting()"
          class="w-full bg-blue-700 hover:bg-blue-800 disabled:bg-gray-400 text-white font-bold py-5 rounded-xl shadow-xl transition-all uppercase tracking-widest text-lg">
          {{ isPosting() ? 'Guardando...' : 'Registrar Usuario' }}
        </button>
      </div>

    </form>
  </div>
</div>

<!-- Modal de confirmación -->
<div *ngIf="mostrarModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50">
  <div class="bg-white rounded-xl shadow-xl p-6 max-w-sm text-center">
    <h2 class="text-lg font-bold text-gray-800 mb-2">✅ Usuario agregado</h2>
    <p class="text-gray-600">El usuario se registró correctamente.</p>
    <button (click)="cerrarModal()" class="mt-4 px-4 py-2 bg-blue-700 text-white rounded-lg hover:bg-blue-800">
      Cerrar
    </button>
  </div>
</div>
